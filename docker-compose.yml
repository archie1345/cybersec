name: cybersec-dev

services:
  app:
    build:
      context: .
      target: dev
    ports:
      - "${APP_PORT}:8000"
    environment:
      APP_NAME: "${APP_NAME}"
      APP_ENV: "${APP_ENV}"
      APP_DEBUG: "${APP_DEBUG}"
      APP_KEY: "${APP_KEY}"
      APP_URL: "${APP_URL}"
      ASSET_URL: "${APP_URL}"
      LOG_CHANNEL: "${LOG_CHANNEL}"
      DB_CONNECTION: "${DB_CONNECTION}"
      DB_HOST: "${DB_HOST_DOCKER}"
      DB_PORT: "${DB_PORT}"
      DB_DATABASE: "${DB_DATABASE}"
      DB_USERNAME: "${DB_USERNAME}"
      DB_PASSWORD: "${DB_PASSWORD}"
      SESSION_DRIVER: "${SESSION_DRIVER}"
      CACHE_STORE: "${CACHE_STORE}"
      QUEUE_CONNECTION: "${QUEUE_CONNECTION}"
    volumes:
      - .:/var/www/html
      - dev_vendor:/var/www/html/vendor
    command: >
      sh -lc "composer install --no-interaction --prefer-dist
      && php artisan config:clear
      && php artisan migrate --force
      && php -S 0.0.0.0:8000 -t public server.php"
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  mysql:
    image: mysql:8.4
    ports:
      - "${MYSQL_PORT}:3306"
    environment:
      MYSQL_DATABASE: "${DB_DATABASE}"
      MYSQL_USER: "${DB_USERNAME}"
      MYSQL_PASSWORD: "${DB_PASSWORD}"
      MYSQL_ROOT_PASSWORD: "${DB_ROOT_PASSWORD}"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  phpmyadmin:
    image: phpmyadmin:5-apache
    ports:
      - "${PHPMYADMIN_PORT}:80"
    environment:
      PMA_HOST: "${PHPMYADMIN_HOST}"
      PMA_PORT: "${PHPMYADMIN_DB_PORT}"
      UPLOAD_LIMIT: "${PHPMYADMIN_UPLOAD_LIMIT}"
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  vite:
    image: node:24-alpine
    working_dir: /var/www/html
    ports:
      - "${VITE_PORT}:5173"
    environment:
      VITE_HMR_HOST: "${VITE_HMR_HOST}"
    volumes:
      - .:/var/www/html
      - dev_node_modules:/var/www/html/node_modules
    command: >
      sh -lc "if [ ! -d node_modules/vue ]; then npm ci; fi
      && npm run dev -- --host 0.0.0.0 --port 5173"
    depends_on:
      - app
    restart: unless-stopped

volumes:
  dev_vendor:
  dev_node_modules:
  mysql_data:
