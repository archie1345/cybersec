name: cybersec-dev

services:
  app:
    build:
      context: .
      target: dev
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      APP_NAME: "Security Awareness Training"
      APP_ENV: local
      APP_DEBUG: "true"
      APP_KEY: "${DOCKER_APP_KEY:-base64:Iu1cDA3NTYXvIaZvKmG/YRextO8FbJdEMdGYma/meuQ=}"
      APP_URL: "${DOCKER_APP_URL:-http://localhost:8000}"
      LOG_CHANNEL: stderr
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: "${DB_DATABASE:-cybersec}"
      DB_USERNAME: "${DB_USERNAME:-cybersec}"
      DB_PASSWORD: "${DB_PASSWORD:-secret}"
      SESSION_DRIVER: file
      CACHE_STORE: file
      QUEUE_CONNECTION: sync
    volumes:
      - .:/var/www/html
      - dev_vendor:/var/www/html/vendor
    command: >
      sh -lc "composer install --no-interaction --prefer-dist
      && php artisan config:clear
      && php artisan migrate --force
      && php artisan serve --host=0.0.0.0 --port=8000"
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  mysql:
    image: mysql:8.4
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    environment:
      MYSQL_DATABASE: "${DB_DATABASE:-cybersec}"
      MYSQL_USER: "${DB_USERNAME:-cybersec}"
      MYSQL_PASSWORD: "${DB_PASSWORD:-secret}"
      MYSQL_ROOT_PASSWORD: "${DB_ROOT_PASSWORD:-root}"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p${DB_ROOT_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  phpmyadmin:
    image: phpmyadmin:5-apache
    ports:
      - "${PHPMYADMIN_PORT:-8081}:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      UPLOAD_LIMIT: 64M
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  vite:
    image: node:24-alpine
    working_dir: /var/www/html
    ports:
      - "${VITE_PORT:-5173}:5173"
    environment:
      VITE_HMR_HOST: "${VITE_HMR_HOST:-localhost}"
    volumes:
      - .:/var/www/html
      - dev_node_modules:/var/www/html/node_modules
    command: >
      sh -lc "if [ ! -d node_modules/vue ]; then npm ci; fi
      && npm run dev -- --host 0.0.0.0 --port 5173"
    depends_on:
      - app
    restart: unless-stopped

volumes:
  dev_vendor:
  dev_node_modules:
  mysql_data:
